    <style>
        /* 1. Basic Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fbfb;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 { text-align: center; color: #5a7d7a; }

        /* 2. Grid Layout for Earrings */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
            padding-bottom: 15px;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

		/* Styling for the Sold State */
		.card.sold {
		    opacity: 0.7;
		    filter: grayscale(80%);
		    pointer-events: none; /* Prevents clicking the card */
		    position: relative;
		}
		
		/* The "Sold Out" Overlay */
		.card.sold::before {
		    content: "SOLD";
		    position: absolute;
		    top: 50%;
		    left: 50%;
		    transform: translate(-50%, -50%) rotate(-15deg);
		    background: rgba(255, 0, 0, 0.8);
		    color: white;
		    padding: 10px 20px;
		    font-weight: bold;
		    font-size: 1.2rem;
		    border-radius: 5px;
		    z-index: 2;
		}

        .view-btn {
            background-color: #8da9a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 3. The Modal (Hidden by default) */
        .modal {
            display: none; /* Hidden */
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
        }

        #modal-img {
            width: 50%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

    // 2. Function to Render all products
    function displayProducts() {
        const grid = document.getElementById('product-grid');
        
        // Loop through each product in the array
        products.forEach(product => {
            // Create the HTML for one card
            // Check if the item is sold
		    const isSold = product.status === 'sold';
		    const soldClass = isSold ? 'sold' : '';
		    const buttonText = isSold ? 'Sold Out' : 'View Details';
		    const buttonDisabled = isSold ? 'disabled' : '';
			
			const cardHTML = `
                <div class="card">
                    <img src="${product.images[0]}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>${product.price}</p>
                    <button class="view-btn" ${buttonDisabled} onclick="openDetails('${product.name}', '${product.desc}', '${product.images.join(',')}')">
                        ${buttonText}
                    </button>
                </div>
            `;
            // Add it to the grid
            grid.innerHTML += cardHTML;
        });
    }


	async function loadProducts() {
    try {
        // 1. Fetch the external JSON file
        const response = await fetch('products.json');
        
        // 2. Turn the raw file into a JavaScript list
        const products = await response.json();
        
        const grid = document.getElementById('product-grid');
        
        // 3. Clear the grid and loop through the data
        grid.innerHTML = ""; 
        products.forEach(product => {

			// Check if the item is sold
		    const isSold = product.status === 'sold';
		    const soldClass = isSold ? 'sold' : '';
		    const buttonText = isSold ? 'Sold Out' : 'View Details';
		    const buttonDisabled = isSold ? 'disabled' : '';
			
            const cardHTML = `
                <div class="card">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>${product.price}</p>
                    <button class="view-btn" ${buttonDisabled} onclick="openDetails('${product.name}', '${product.desc}', '${product.images.join(',')}')">
                      ${buttonText}
                    </button>
                </div>
            `;
            grid.innerHTML += cardHTML;
        });
		} 
	catch (error) 
		{
			console.error("Could not load products:", error);
		}
	}


    // 3. Modal Functions (Same as before)
	
	// Function to update the main image when a thumbnail is clicked
	function changeMainImage(src) 
		{
			document.getElementById('modal-img').src = src;
		}
	
    function openDetails(title, description, imageArrayString) {
	
		// Convert the string back into a real array
		const images = imageArrayString.split(',');
	
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = description;
        document.getElementById('modal-img').src = images[0];
		
		const thumbContainer = document.getElementById('thumbnail-container');
		thumbContainer.innerHTML = ""; // Clear old thumbnails
		
		// Create a thumbnail for each image in the array
			images.forEach(imgSrc => {
			const thumb = document.createElement('img');
			thumb.src = imgSrc;
			thumb.style.width = "60px";
			thumb.style.height = "60px";
			thumb.style.cursor = "pointer";
			thumb.style.objectFit = "cover";
			thumb.style.borderRadius = "5px";
			thumb.style.border = "1px solid #ddd";
			
			// When clicked, change the main image
			thumb.onclick = () => changeMainImage(imgSrc);
			
			thumbContainer.appendChild(thumb);
		});
		
        document.getElementById('detailsModal').style.display = "block";
    }

    function closeModal() {
